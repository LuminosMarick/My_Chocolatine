name: Chocolatine Workflow

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: ${{ secrets.MIRROR_SSH_URL }}
  EXECUTABLES: "mysh"

jobs:

  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    # Mis à jour pour ton nouveau dépôt
    if: github.repository == 'LuminosMarick/My_Chocolatine'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run banana-check-repo
        run: banana-check-repo .

      - name: Compile project
        run: make
        timeout-minutes: 2
        env:
          CC: gcc

      - name: Check coding style errors
        run: |
          if [ -f coding-style-reports.log ]; then
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1)
              line_num=$(echo "$line" | cut -d':' -f2)
              msg=$(echo "$line" | cut -d':' -f3-)
              echo "::error file=$file,line=$line_num::$msg"
            done < coding-style-reports.log
            exit 1
          fi

      - name: Clean repository
        run: make clean

      - name: Check executables
        run: |
          IFS=',' read -ra EXE <<< "$EXECUTABLES"
          for exe in "${EXE[@]}"; do
            if [ ! -f "$exe" ]; then
              echo "::error file=$exe::Executable not found"
              exit 1
            fi
            if [ ! -x "$exe" ]; then
              echo "::error file=$exe::File is not executable"
              exit 1
            fi
          done

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    container:
      image: epitechcontent/epitest-docker

    if: github.repository == 'LuminosMarick/My_Chocolatine'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push' && github.repository == 'LuminosMarick/My_Chocolatine'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
