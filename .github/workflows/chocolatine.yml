name: Chocolatine Workflow

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: ${{ secrets.MIRROR_SSH_URL }}
  EXECUTABLES: "mysh,oswald"

jobs:
  check_compilation_and_coding_style:
    name: check_compilation_and_coding_style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    if: github.repository == 'LuminosMarick/My_Chocolatine'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run coding style check
        run: banana-check-repo .

      - name: Check coding style errors
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            cat coding-style-reports.log
            exit 1
          fi

      - name: Compile project
        run: make
        timeout-minutes: 2

      - name: Check executables
        run: |
          for exe in $(echo $EXECUTABLES | tr ',' ' '); do
            if [ ! -x "$exe" ]; then
              echo "::error file=$exe::Executable '$exe' not found or not executable"
              exit 1
            fi
          done

      - name: Clean repository
        run: make clean

  run_tests:
    name: run_tests
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    container:
      image: epitechcontent/epitest-docker
    if: github.repository == 'LuminosMarick/My_Chocolatine'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push' && github.repository == 'LuminosMarick/My_Chocolatine'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
